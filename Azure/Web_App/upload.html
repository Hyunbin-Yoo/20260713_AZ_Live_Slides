<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Photo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex flex-col items-center justify-center p-4 text-slate-800">
    <div class="bg-white p-6 rounded-xl shadow-md w-full max-w-sm">
        <h1 class="text-xl font-bold mb-4 text-center">Lab Photo Submission</h1>
        <input type="file" id="fileInput" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 mb-4"/>
        <button onclick="uploadPhoto()" id="uploadBtn" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">Upload</button>
        <p id="status" class="text-xs text-center mt-4 font-mono text-slate-500"></p>
    </div>

    <script>
        async function uploadPhoto() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');
            
            if (fileInput.files.length === 0) {
                status.innerText = "Please select a file first.";
                return;
            }

            const file = fileInput.files[0];
            btn.disabled = true;
            status.innerText = "Requesting secure upload token...";

            try {
                // 1. Get SAS Token from Azure Function
                const tokenResponse = await fetch(`/api/getUploadToken?filename=${file.name}`);
                if (!tokenResponse.ok) throw new Error("Upload window closed or server error.");
                const { sasUrl, blobUrl } = await tokenResponse.json();

                // 2. Direct upload to Azure Blob Storage
                status.innerText = "Uploading directly to Azure...";
                await fetch(sasUrl, {
                    method: 'PUT',
                    headers: { 'x-ms-blob-type': 'BlockBlob' },
                    body: file
                });

                // 3. Register the photo in Cosmos DB and broadcast via SignalR
                status.innerText = "Registering photo with presentation...";
                await fetch('/api/registerPhoto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: blobUrl })
                });

                status.innerText = "Success! Photo added to queue.";
                status.classList.add("text-green-600");
                fileInput.value = "";
            } catch (error) {
                status.innerText = `Error: ${error.message}`;
                status.classList.add("text-red-600");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
