<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 text-slate-800">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-6">
        <h1 class="text-2xl font-bold border-b pb-4 mb-4">Presentation Control Center</h1>
        
        <div class="grid grid-cols-3 gap-4">
            <button onclick="setPhase('pre')" class="p-4 bg-slate-200 hover:bg-slate-300 rounded font-bold text-slate-700 transition">1. Pre-Event (Locked)</button>
            <button onclick="setPhase('open')" class="p-4 bg-green-500 hover:bg-green-600 rounded font-bold text-white transition shadow-lg">2. Open Submissions</button>
            <button onclick="setPhase('closed')" class="p-4 bg-red-500 hover:bg-red-600 rounded font-bold text-white transition">3. Close Submissions</button>
        </div>

        <p id="admin-status" class="mt-6 text-sm font-mono text-slate-500 text-center">Ready.</p>

        <hr class="my-6">

        <h2 class="text-xl font-bold mb-4">Photo Queue</h2>
        <div id="photo-list" class="space-y-2">
            <!-- Photos will be loaded here -->
        </div>
    </div>

    <script>
        async function setPhase(phase) {
            const status = document.getElementById('admin-status');
            status.innerText = `Updating phase to: ${phase}...`;
            
            try {
                await fetch('/api/setPhase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phase: phase })
                });
                status.innerText = `Phase successfully set to: ${phase.toUpperCase()}`;
            } catch (error) {
                status.innerText = `Error updating phase: ${error.message}`;
            }
        }

        async function loadPhotos() {
            const photoList = document.getElementById('photo-list');
            try {
                const response = await fetch('/api/getPhotos');
                const photos = await response.json();
                photoList.innerHTML = photos.map(photo => `
                    <div class="flex items-center justify-between bg-slate-50 p-2 rounded">
                        <img src="${photo.url}" alt="Photo" class="w-16 h-16 object-cover rounded">
                        <span class="text-sm text-slate-600">${photo.id}</span>
                        <button onclick="deletePhoto('${photo.id}')" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm">Delete</button>
                    </div>
                `).join('');
            } catch (error) {
                photoList.innerHTML = `<p class="text-red-500">Error loading photos: ${error.message}</p>`;
            }
        }

        async function deletePhoto(id) {
            if (!confirm('Delete this photo?')) return;
            try {
                await fetch(`/api/deletePhoto?id=${id}`, { method: 'DELETE' });
                loadPhotos();
            } catch (error) {
                alert('Error deleting photo: ' + error.message);
            }
        }

        // Load photos on page load
        loadPhotos();
    </script>
</body>
</html>
